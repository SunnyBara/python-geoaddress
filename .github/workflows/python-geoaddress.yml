name: CI python-geoaddress

on:
  push:
    branches: ["main"]
    paths:
      - "python-geoaddress/**"
      - ".github/workflows/python-geoaddress.yml"
  pull_request:
    paths:
      - "python-geoaddress/**"
      - ".github/workflows/python-geoaddress.yml"
  workflow_dispatch:

jobs:
  test-python-geoaddress:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10","3.11","3.12"]

    defaults:
      run:
        working-directory: python-geoaddress

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies and local packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install "clicommands @ git+https://github.com/SunnyBara/python-clicommands.git@3d8b78ba62d1ff3fff0803060a467d8f44cbc86a"
          python -m pip install "providerkit @ git+https://github.com/SunnyBara/python-providerkit.git@601f27aaab01c8d9608551b38218861d917c19ee#subdirectory=python-providerkit"
          python -m pip install -e ../python-geoaddress
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest

      - name: Build package
        run: python -m build
